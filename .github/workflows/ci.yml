name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        working-directory: backend
        run: php artisan test
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync

  frontend:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        working-directory: frontend
        # Forcer les devDependencies + binaire Rollup Linux (bug npm optional deps sur CI)
        run: |
          npm ci --include=dev
          npm install --no-save @rollup/rollup-linux-x64-gnu
        env:
          NODE_ENV: development

      - name: Run unit tests
        working-directory: frontend
        run: npx vitest run --reporter=verbose
        env:
          CI: true
          VITEST: 'true'
          NODE_ENV: test

  e2e:
    name: Cypress E2E
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Prepare backend env
        run: cp backend/.env.example backend/.env

      - name: Start Docker stack
        run: docker compose up -d --build

      - name: Wait for MySQL and run migrations
        run: |
          for i in $(seq 1 36); do
            docker compose exec -T mysql mysqladmin ping -h 127.0.0.1 -uroot -proot --silent && break
            sleep 5
          done
          docker compose exec -T backend composer install --no-interaction --prefer-dist --no-dev
          docker compose exec -T backend php artisan key:generate --force
          docker compose exec -T backend php artisan migrate --force --seed

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/v1/products && curl -sf http://localhost:5173 && break
            sleep 5
          done

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Cypress
        working-directory: frontend
        run: |
          npm ci --include=dev
          npm install --no-save @rollup/rollup-linux-x64-gnu
        env:
          NODE_ENV: development

      - name: Run Cypress
        working-directory: frontend
        run: npm run cy:run
