services:
  backend:
    build: ./docker/php
    container_name: ecommerce-backend
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    depends_on:
      mysql:
        condition: service_healthy
      cv-service:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_DATABASE: ecommerce
      DB_USERNAME: ecommerce
      DB_PASSWORD: secret
      CV_SERVICE_URL: http://cv-service:8090

  nginx:
    image: nginx:alpine
    container_name: ecommerce-nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/node/Dockerfile
    container_name: ecommerce-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8080/api/v1
    depends_on:
      - nginx

  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: ecommerce
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: ecommerce-phpmyadmin
    ports:
      - "8082:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ecommerce
      PMA_PASSWORD: secret
    depends_on:
      mysql:
        condition: service_healthy

  cv-service:
    build: ./cv-service
    container_name: ecommerce-cv
    ports:
      - "8090:8090"
    environment:
      CV_MIN_GOOD_MATCHES: 10
      CV_MATCH_RATIO: 0.8
      CV_MIN_CONFIDENCE_GAP: 3
      CV_MAX_IMAGE_DIM: 800
    volumes:
      - cv_index_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mysql_data:
  cv_index_data:
